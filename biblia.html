<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biblia — Ad Fontes</title>
<meta name="description" content="Ad Fontes · Lectura y estudio de la Escritura, capítulo a capítulo, con panel de estudio confesional.">
<link rel="icon" type="image/png" href="Logo%20Ad%20Fontes.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#262626">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=EB+Garamond:ital@0;1&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --carbon:#262626; --carbon2:#383838; --gold:#b98d3e; --gold-light:#d8b571;
  --cream:#faf7f1; --paper:#ffffff; --ink:#2b2b2b; --ink-soft:#6a6a6a;
  --line:#e6dfd2; --green:#3e7a4e;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--cream);color:var(--ink);font-family:'EB Garamond',Georgia,serif;font-size:19px;line-height:1.7}

.topbar{position:sticky;top:0;z-index:100;background:var(--carbon);display:flex;align-items:center;gap:1rem;padding:.55rem 1rem;box-shadow:0 2px 12px rgba(0,0,0,.25)}
.brand{display:flex;align-items:center;gap:.55rem;color:#fff;font-family:'Cormorant Garamond',serif;font-weight:600;font-size:1.15rem;white-space:nowrap;text-decoration:none}
.brand img{width:30px;height:30px;border-radius:7px}
.brand small{font-family:'Inter',sans-serif;font-size:.55rem;letter-spacing:.25em;color:var(--gold-light);display:block;line-height:1}
.buscador{flex:1;max-width:560px;margin:0 auto}
.buscador>button{width:100%;display:flex;align-items:center;gap:.6rem;background:#333;border:1px solid #4a4a4a;border-radius:9px;padding:.5rem .8rem;color:#9a948a;font-family:'Inter',sans-serif;font-size:.8rem;cursor:pointer;text-align:left}
.buscador>button:hover{border-color:var(--gold)}
.buscador .atajo{margin-left:auto;font-size:.62rem;border:1px solid #555;border-radius:4px;padding:.05rem .35rem;color:#777}
.volver{font-family:'Inter',sans-serif;font-size:.72rem;color:#cfcac2;text-decoration:none;border:1px solid #4a4a4a;border-radius:8px;padding:.4rem .7rem;white-space:nowrap}
.volver:hover{border-color:var(--gold);color:#fff}

.pagina{max-width:1200px;margin:0 auto;padding:1.4rem 1rem 5rem;display:flex;gap:2rem;justify-content:center}
.columna-texto{max-width:660px;flex:1;min-width:0}

.selector-linea{display:flex;align-items:center;gap:.45rem;margin-bottom:.9rem;font-family:'Inter',sans-serif;flex-wrap:wrap}
.sel-chip{background:#fff;border:1px solid var(--line);border-radius:9px;padding:.45rem .9rem;font-size:.88rem;font-weight:600;color:var(--carbon);cursor:pointer;display:flex;align-items:center;gap:.4rem}
.sel-chip:hover{border-color:var(--gold)}
.sel-chip span{color:var(--ink-soft);font-size:.7rem}
.nav-cap{display:flex;gap:.3rem}
.nav-cap button{background:#fff;border:1px solid var(--line);border-radius:9px;width:34px;height:34px;cursor:pointer;color:var(--ink-soft);font-size:.9rem}
.nav-cap button:hover{border-color:var(--gold)}
.nav-cap button:disabled{opacity:.3;cursor:default}

.cinta-plan{display:flex;align-items:center;gap:.7rem;background:#eef6ef;border:1px solid #bcd8c0;border-left:4px solid var(--green);border-radius:9px;padding:.6rem .9rem;margin-bottom:1.4rem;font-family:'Inter',sans-serif;font-size:.8rem;color:#2c4a34;flex-wrap:wrap}
.cinta-plan button{margin-left:auto;background:var(--green);color:#fff;border:none;border-radius:7px;padding:.45rem .9rem;font-size:.76rem;font-weight:600;cursor:pointer;white-space:nowrap}
.cinta-plan button.hecho{background:#fff;color:var(--green);border:1.5px solid var(--green)}

h1.cap-titulo{font-family:'Cormorant Garamond',serif;font-size:2.1rem;font-weight:600;color:var(--carbon);margin-bottom:.2rem}
.cap-sub{font-family:'Inter',sans-serif;font-size:.7rem;color:var(--ink-soft);letter-spacing:.12em;text-transform:uppercase;margin-bottom:1.4rem;line-height:1.8}

.verso{display:flex;gap:.8rem;padding:.48rem .6rem;border-radius:9px;cursor:pointer;transition:background .15s}
.verso:hover{background:#f3eee3}
.verso.activo{background:#f6f0e0;outline:1px solid var(--gold)}
.verso .n{font-family:'Inter',sans-serif;font-size:.62rem;font-weight:700;color:var(--gold);min-width:1.5rem;text-align:right;padding-top:.45rem;flex-shrink:0}
.verso p{flex:1}
.cargando{text-align:center;color:var(--ink-soft);font-style:italic;padding:3rem 0}

.panel{width:400px;flex-shrink:0;position:sticky;top:70px;align-self:flex-start;max-height:calc(100vh - 90px);overflow:auto;background:var(--paper);border:1px solid var(--line);border-radius:14px;box-shadow:0 6px 30px rgba(0,0,0,.08);display:none}
.panel.abierto{display:block}
.panel-cab{display:flex;align-items:center;padding:.9rem 1.1rem;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--paper);border-radius:14px 14px 0 0;z-index:2}
.panel-cab h2{font-family:'Cormorant Garamond',serif;font-size:1.25rem;color:var(--carbon)}
.panel-cab button{margin-left:auto;background:none;border:none;font-size:1rem;cursor:pointer;color:var(--ink-soft)}
.capa{border-bottom:1px solid #f0ebe0}
.capa summary{list-style:none;display:flex;align-items:center;gap:.55rem;padding:.85rem 1.1rem;cursor:pointer;font-family:'Inter',sans-serif;font-size:.8rem;font-weight:600;color:var(--carbon)}
.capa summary::-webkit-details-marker{display:none}
.capa summary .flecha{margin-left:auto;color:var(--ink-soft);font-size:.7rem;transition:transform .2s}
.capa[open] summary .flecha{transform:rotate(90deg)}
.capa .cuerpo{padding:.2rem 1.1rem 1rem;font-size:.97rem}
.capa .fuente{font-family:'Inter',sans-serif;font-size:.68rem;color:#7a5b1e;margin-top:.3rem}
.capa .aviso{font-family:'Inter',sans-serif;font-size:.75rem;color:var(--ink-soft)}
.chips{display:flex;flex-wrap:wrap;gap:.35rem;margin-top:.4rem}
.chip{font-family:'Inter',sans-serif;font-size:.7rem;color:#7a5b1e;background:#f6f0e0;border:1px solid #dcc9a0;border-radius:14px;padding:.2rem .6rem;cursor:pointer;border-style:solid}
.chip:hover{background:#efe4c8}
.rec{display:block;font-family:'Inter',sans-serif;font-size:.78rem;color:var(--carbon);background:var(--cream);border:1px solid var(--line);border-radius:8px;padding:.5rem .7rem;margin-top:.4rem;text-decoration:none;cursor:pointer}
.rec:hover{border-color:var(--gold)}
.rec small{color:var(--ink-soft);display:block;font-size:.66rem}
.cita-p{border-bottom:1px dashed var(--line);padding:.45rem 0}
.cita-p:last-of-type{border-bottom:none}
.acciones-v{display:flex;gap:.3rem;padding:.6rem 1.1rem;border-bottom:1px solid #f0ebe0;flex-wrap:wrap}
.acc{font-family:'Inter',sans-serif;font-size:.72rem;font-weight:600;background:var(--cream);border:1px solid var(--line);border-radius:8px;padding:.4rem .6rem;cursor:pointer;color:var(--carbon);display:inline-flex;align-items:center;gap:.25rem}
.acc:hover{border-color:var(--gold)}
.acc.on{background:#fdf3d8;border-color:var(--gold);color:#7a5b1e}
.nota-caja{padding:0 1.1rem .8rem;display:none}
.nota-caja.abierta{display:block}
.nota-caja textarea{width:100%;padding:.55rem .65rem;border:1px solid var(--line);border-radius:8px;font-family:'EB Garamond',serif;font-size:.95rem;resize:vertical}
.nota-caja .fila-n{display:flex;gap:.35rem;margin-top:.35rem}
.verso.marcado{background:#fdf3d8;box-shadow:inset 3px 0 0 var(--gold)}
.verso.con-nota .n::after{content:'📝';font-size:.6rem;display:block}
.cx{display:block;font-family:'Inter',sans-serif;font-size:.78rem;color:var(--carbon);background:var(--cream);border:1px solid var(--line);border-radius:8px;padding:.45rem .6rem;margin-top:.35rem;cursor:pointer;text-decoration:none}
.cx:hover{border-color:var(--gold)}
.cx b{color:#7a5b1e}
.cx small{display:block;color:var(--ink-soft);font-size:.68rem;margin-top:.1rem}
.vid{display:block;text-decoration:none;color:inherit;background:var(--cream);border:1px solid var(--line);border-radius:10px;overflow:hidden;margin-top:.5rem}
.vid:hover{border-color:var(--gold)}
.vid img{width:100%;display:block}
.vid .vt{font-family:'Inter',sans-serif;font-size:.8rem;font-weight:600;padding:.5rem .7rem .1rem;color:var(--carbon)}
.vid .vd{font-family:'Inter',sans-serif;font-size:.7rem;color:var(--ink-soft);padding:0 .7rem .5rem}
.toast{position:fixed;bottom:1.2rem;left:50%;transform:translateX(-50%);background:var(--carbon);color:#fff;font-family:'Inter',sans-serif;font-size:.78rem;padding:.6rem 1.1rem;border-radius:10px;z-index:200;opacity:0;transition:opacity .25s;pointer-events:none}
.toast.ver{opacity:1}

.overlay{position:fixed;inset:0;background:rgba(20,18,14,.55);backdrop-filter:blur(3px);display:none;align-items:flex-start;justify-content:center;z-index:150;padding:7vh 1rem 1rem}
.overlay.abierto{display:flex}
.tarjeta{background:#fff;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.35);width:100%;max-width:700px;max-height:80vh;overflow:auto}
.tarjeta-cab{padding:.9rem 1.3rem;border-bottom:1px solid var(--line);font-family:'Inter',sans-serif;font-size:.75rem;font-weight:600;color:var(--ink-soft);display:flex;align-items:center;gap:.6rem;position:sticky;top:0;background:#fff;border-radius:16px 16px 0 0}
.tarjeta-cab input{flex:1;border:none;outline:none;font-family:'EB Garamond',serif;font-size:1.15rem;color:var(--ink);background:transparent}
.libros{display:grid;grid-template-columns:1fr 1fr;padding:.6rem 0}
.libros h4{font-family:'Inter',sans-serif;font-size:.62rem;letter-spacing:.2em;color:var(--gold);text-transform:uppercase;padding:.6rem 1.3rem .3rem}
.col-libros{display:flex;flex-direction:column;padding-bottom:.6rem}
.libro{font-family:'EB Garamond',serif;font-size:1rem;padding:.3rem 1.3rem;cursor:pointer;color:var(--ink)}
.libro:hover{background:var(--cream);color:#7a5b1e}
.libro.actual{color:#7a5b1e;font-weight:700}
.caps-grid{display:flex;flex-wrap:wrap;gap:.4rem;padding:1rem 1.3rem 1.3rem}
.caps-grid button{font-family:'Inter',sans-serif;font-size:.8rem;width:44px;height:40px;background:var(--cream);border:1px solid var(--line);border-radius:8px;cursor:pointer;color:var(--ink)}
.caps-grid button:hover{border-color:var(--gold)}
.caps-grid button.actual{background:var(--carbon);color:#fff;border-color:var(--carbon)}
.grupo-res h5{font-family:'Inter',sans-serif;font-size:.62rem;letter-spacing:.18em;color:var(--gold);text-transform:uppercase;padding:.6rem 1.3rem .2rem}
.res{display:flex;align-items:baseline;gap:.6rem;padding:.5rem 1.3rem;cursor:pointer}
.res:hover{background:var(--cream)}
.res b{font-family:'Inter',sans-serif;font-size:.78rem;color:var(--carbon);white-space:nowrap}
.res span{font-size:.88rem;color:var(--ink-soft);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sin-res{padding:1.2rem 1.3rem;color:var(--ink-soft);font-style:italic}

@media(max-width:1020px){
  .pagina{flex-direction:column}
  .panel{position:fixed;inset:auto 0 0 0;width:100%;max-height:70vh;border-radius:16px 16px 0 0;z-index:120;box-shadow:0 -10px 40px rgba(0,0,0,.25)}
  .buscador .atajo{display:none}
}
@media(max-width:680px){
  html,body{overflow-x:hidden;max-width:100%}
  body{font-size:17px}
  .topbar{flex-wrap:wrap;gap:.45rem;padding:.5rem .7rem}
  .brand{font-size:1rem}.brand img{width:26px;height:26px}
  .brand small{font-size:.48rem;letter-spacing:.16em}
  .buscador{order:5;flex:1 0 100%;max-width:none;margin:0}
  .buscador>button{padding:.45rem .7rem;font-size:.76rem}
  .volver{font-size:.66rem;padding:.32rem .5rem;margin-left:auto}
  .volver + .volver{margin-left:0}
  .pagina{padding:1rem .8rem 6rem;gap:1rem}
  .columna-texto{max-width:100%}
  .selector-linea{gap:.3rem}
  .sel-chip{padding:.4rem .7rem;font-size:.8rem}
  .nav-cap button{width:32px;height:32px}
  .cinta-plan{font-size:.75rem;padding:.55rem .7rem}
  .cinta-plan button{margin-left:0;width:100%;justify-content:center}
  h1.cap-titulo{font-size:1.6rem}
  .verso{gap:.5rem;padding:.4rem .25rem}
  .verso .n{min-width:1.2rem}
  .panel{max-height:76vh}
  .capa .cuerpo{font-size:.94rem}
  .tarjeta{max-height:84vh}
  .libros{grid-template-columns:1fr}
  .caps-grid{padding:.8rem 1rem}
  .caps-grid button{width:38px;height:36px;font-size:.75rem}
  .overlay{padding:4vh .7rem 1rem}
}
</style>
</head>
<body>

<div class="topbar">

</div>

    <div class="caps-grid" id="gridCaps"></div>
  </div>
</div>

<div class="overlay" id="ovBuscar" onclick="if(event.target===this)this.classList.remove('abierto')">
  <div class="tarjeta">
    <div class="tarjeta-cab">🔍 <input id="qInput" placeholder="Un pasaje (Romanos 8:29), una palabra (pacto)…" oninput="buscar(this.value)" autocomplete="off"></div>

</div>

/* ================= Navegación ================= */
function irA(l, c, v){
  L = l; C = Math.min(Math.max(1, c), LIBROS[l][1]);
  location.hash = encodeURIComponent(LIBROS[L][0]) + '/' + C + (v ? '/' + v : '');
  document.querySelectorAll('.overlay').forEach(o => o.classList.remove('abierto'));
  cargarCapitulo(v || null);
}
function capVecino(d){
  let l = L, c = C + d;
  if(c < 1){ if(l > 0){ l--; c = LIBROS[l][1]; } else c = 1; }
  if(c > LIBROS[l][1]){ if(l < 65){ l++; c = 1; } else c = LIBROS[l][1]; }
  irA(l, c);
}
function leerHash(){
  const h = decodeURIComponent(location.hash.slice(1));
  const m = h.match(/^(.+?)\/(\d+)(?:\/(\d+))?$/);
  if(m && IDX_LIBRO[normTxt(m[1])] !== undefined){
    L = IDX_LIBRO[normTxt(m[1])]; C = parseInt(m[2], 10);
    return m[3] ? parseInt(m[3], 10) : null;
  }
  return null;
}
window.addEventListener('hashchange', () => { const v = leerHash(); cargarCapitulo(v); });

/* ================= Render del capítulo ================= */
function diaDeCapitulo(){
  const nombre = LIBROS[L][0];
  for(const p of PLAN){
    for(const lec of p.lecturas){
      const m = lec.match(/^(.+?)\s+(\d+)(?:-(\d+))?$/);
      if(m && m[1] === nombre && C >= parseInt(m[2],10) && C <= parseInt(m[3] || m[2],10)) return p;
    }
  }
  return null;
}
function pintarCinta(){
  const p = diaDeCapitulo();
  const el = document.getElementById('cinta');

    '<button class="' + (hecho ? 'hecho' : '') + '" onclick="marcarDia(' + p.d + ')">' + (hecho ? '✓ Leído' : '✓ Marcar como leído') + '</button></div>';
}
function marcarDia(d){
  if(done.has(d)) done.delete(d);
  else { done.add(d); localStorage.setItem('biblia365_lh', (function(){const x=new Date();return x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0')+'-'+String(x.getDate()).padStart(2,'0');})()); }
  localStorage.setItem('biblia365_done', JSON.stringify([...done]));

  empujarNube();
}

/* ================= Conexiones: quién cita este pasaje ================= */
function parseRef(r){
  const m = r.trim().match(/^([123]?\s?[A-Za-zÁÉÍÓÚÜÑáéíóúüñ]+)\.?\s+(\d+)(?::(\d+)(?:-(\d+))?)?/);
  if(!m) return null;
  const clave = m[1].toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/\s+/g,'');
  const idx = ABREV[clave] !== undefined ? ABREV[clave] : IDX_LIBRO[normTxt(m[1])];
  if(idx === undefined) return null;
  return { l: idx, c: parseInt(m[2],10), v1: m[3] ? parseInt(m[3],10) : null, v2: m[4] ? parseInt(m[4],10) : (m[3] ? parseInt(m[3],10) : null) };
}
function refTocaVerso(r, v){
  const p = parseRef(r);
  if(!p || p.l !== L || p.c !== C) return false;
  return !p.v1 || (v >= p.v1 && v <= p.v2);
}
function quienCita(v){
  const out = [];
  /* Confesiones: pruebas bíblicas que apuntan a este versículo */
  if(typeof CONFESIONES !== 'undefined'){
    ['lbc','west'].forEach(id => {
      CONFESIONES[id].caps.forEach((cap, i) => {
        if(!cap.p) return;
        cap.p.forEach((tx, j) => {
          const m = tx.match(/\(([^()]+)\)\s*$/);
          if(!m || !/\d/.test(m[1])) return;
          if(m[1].split(';').some(r => refTocaVerso(r, v))){
            const nom = id === 'lbc' ? 'Confesión 1689' : 'Westminster';
            out.push({ t: nom + ' · Cap. ' + (i+1) + '.' + (j+1), s: cap.t, u: 'biblioteca.html#confesiones' });
          }
        });
      });
    });
  }
  /* Base de autores: pasajes cuyas referencias relacionadas apuntan aquí */
  if(typeof ESTUDIO !== 'undefined'){
    ESTUDIO.forEach(e => {
      if(e.ver && e.ver.some(r => refTocaVerso(r, v)))
        out.push({ t: 'Autores · ' + e.ref, s: e.tema + ' — lo conecta con este pasaje', u: 'biblioteca.html#autores' });
    });
  }
  return out;
}
function recursosDe(v){
  if(typeof RECURSOS === 'undefined') return [];
  return RECURSOS.filter(x => (x.pasajes || []).some(p => {
    const q = parseRef(p);
    if(!q || q.l !== L) return false;
    if(q.c !== C) return false;
    return !q.v1 || (v >= q.v1 && v <= q.v2);
  }));
}

    '<a class="rec" target="_blank" rel="noopener" href="https://biblehub.com/commentaries/gill/' + slug + '/' + C + '.htm">📖 Gill sobre ' + nombre + ' ' + C + '<small>Comentario completo · inglés</small></a>' +

    (p ? '<a class="rec" href="index.html">📅 Día ' + p.d + ' del plan: ' + p.lecturas.join('; ') + '<small>Estudio completo del bloque en el plan</small></a>' : '') +

function irARef(r){

function abrirBuscar(){

  setTimeout(() => document.getElementById('qInput').focus(), 50);
}
function buscar(q){
  const out = document.getElementById('qResultados');
  q = q.trim();
  if(q.length < 2){ out.innerHTML = '<div class="sin-res">Escribe un pasaje o una palabra…</div>'; return; }
  let h = '';
  /* ¿Es una referencia? */
  const m = q.match(/^([123]?\s?[A-Za-zÁÉÍÓÚÜÑáéíóúüñ\s]+?)\s+(\d+)(?::(\d+))?$/);
  if(m){
    const nq = normTxt(m[1]);
    const clave = nq.replace(/\s+/g,'');
    const idx = IDX_LIBRO[nq] !== undefined ? IDX_LIBRO[nq] : ABREV[clave];
    if(idx !== undefined){
      h += '<div class="grupo-res"><h5>Ir al pasaje</h5><div class="res" onclick="irA(' + idx + ',' + parseInt(m[2],10) + (m[3] ? ',' + parseInt(m[3],10) : ',null') + ')"><b>' +
        LIBROS[idx][0] + ' ' + m[2] + (m[3] ? ':' + m[3] : '') + '</b><span>Abrir en la Biblia</span></div></div>';
    }
  }
  const nq2 = normTxt(q);
  if(nq2.length >= 3){
    /* Estudios del plan */
    let rp = [];
    if(typeof COMENTARIOS !== 'undefined'){
      for(const d in COMENTARIOS){
        const c = COMENTARIOS[d];
        if(normTxt([c.t,c.h,c.c,c.n,c.p,c.v,c.q].join(' ')).includes(nq2)){
          const p = PLAN[d-1];
          const lm = p.lecturas[0].match(/^(.+?)\s+(\d+)/);
          const idx2 = lm ? IDX_LIBRO[normTxt(lm[1])] : undefined;
          rp.push({ d: d, t: c.t, l: idx2, c: lm ? parseInt(lm[2],10) : 1 });
          if(rp.length >= 6) break;
        }
      }
    }
    if(rp.length) h += '<div class="grupo-res"><h5>Estudios del plan</h5>' + rp.map(r =>
      '<div class="res" onclick="irA(' + r.l + ',' + r.c + ')"><b>Día ' + r.d + '</b><span>' + r.t + '</span></div>').join('') + '</div>';
    /* Base de autores */
    if(typeof ESTUDIO !== 'undefined'){
      const re = ESTUDIO.filter(e => normTxt(e.ref + ' ' + e.tema + ' ' + e.citas.map(x => x.txt + ' ' + x.autor).join(' ')).includes(nq2)).slice(0,4);
      if(re.length) h += '<div class="grupo-res"><h5>Base de autores</h5>' + re.map(e => {
        const idx3 = IDX_LIBRO[normTxt(e.libro)];
        return '<div class="res" onclick="irA(' + idx3 + ',' + e.cap + (e.vv ? ',' + e.vv[0] : ',null') + ')"><b>' + e.ref + '</b><span>' + e.tema + '</span></div>';
      }).join('') + '</div>';
    }
    /* Confesión (enlace al sitio del plan) */
    h += '<div class="grupo-res"><h5>Más</h5><div class="res" onclick="localStorage.setItem(\'biblia365_vista\',\'conf\');location.href=\'index.html\'"><b>Confesión 1689</b><span>Buscar «' + q + '» en las confesiones (en el sitio del plan)</span></div></div>';
  }
  out.innerHTML = h || '<div class="sin-res">Sin resultados. Prueba con otra palabra o una referencia como «Romanos 8:29».</div>';
}

/* ================= Teclado ================= */
document.addEventListener('keydown', e => {
  if((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k'){ e.preventDefault(); abrirBuscar(); }
  if(e.key === 'Escape'){ document.querySelectorAll('.overlay.abierto').forEach(o => o.classList.remove('abierto')); cerrarPanel(); }
  if(e.key === 'ArrowLeft' && !e.target.closest('input')) capVecino(-1);
  if(e.key === 'ArrowRight' && !e.target.closest('input')) capVecino(1);
});

/* ================= Arranque ================= */
/* Sin dirección explícita, la Biblia abre en la lectura de hoy del plan */
/* Sigue el plan que el lector tenga activo (cronológico, canónico, NT 90, Salmos y Proverbios) */
function planActivo(){
  const id = localStorage.getItem('af_plan_activo') || 'cronologico';
  return (typeof PLANES_IDX !== 'undefined' && PLANES_IDX[id]) ? id : 'cronologico';
}
function diaDelPlanHoy(){
  const id = planActivo();
  const k = (id === 'cronologico') ? 'biblia365_' : 'af_' + id + '_';
  const tot = (typeof PLANES_IDX !== 'undefined' && PLANES_IDX[id]) ? PLANES_IDX[id].dias : 365;
  const s0 = localStorage.getItem(k + 'start');
  if(!s0) return parseInt(localStorage.getItem(k + 'current') || '0', 10) || 0;
  const s = new Date(s0 + 'T00:00:00'), n = new Date(); n.setHours(0,0,0,0);
  return Math.min(Math.max(Math.floor((n - s) / 86400000) + 1, 1), tot);
}
function abrirLecturaDeHoy(){
  const d = diaDelPlanHoy();
  if(!d) return false;
  const arr = (typeof diasDe !== 'undefined') ? diasDe(planActivo()) : (typeof PLAN !== 'undefined' ? PLAN : null);
  if(!arr || !arr[d - 1]) return false;
  const m = arr[d - 1].lecturas[0].match(/^(.+?)\s+(\d+)/);
  if(!m) return false;
  const idx = IDX_LIBRO[normTxt(m[1])];
  if(idx === undefined) return false;
  L = idx; C = parseInt(m[2], 10);
  location.hash = encodeURIComponent(LIBROS[L][0]) + '/' + C;
  return true;
}
const v0 = leerHash();
if(!location.hash && abrirLecturaDeHoy()){
  cargarCapitulo(null);
} else {
  cargarCapitulo(v0);
}
