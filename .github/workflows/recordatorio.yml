name: Recordatorio diario de lectura

on:
  schedule:
    - cron: '0 * * * *'   # cada hora: se envia a quienes eligieron esta hora (en su zona horaria)
  workflow_dispatch:       # ejecucion manual: envia a todos (para probar)

jobs:
  enviar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip -q install google-auth requests

      - name: Enviar notificaciones
        env:
          FIREBASE_SA: ${{ secrets.FIREBASE_SA }}
          EVENTO: ${{ github.event_name }}
        run: |
          python - <<'EOF'
          import json, os, requests, datetime
          from google.oauth2 import service_account
          import google.auth.transport.requests as gtr

          sa = json.loads(os.environ['FIREBASE_SA'])
          creds = service_account.Credentials.from_service_account_info(
              sa, scopes=['https://www.googleapis.com/auth/datastore',
                          'https://www.googleapis.com/auth/firebase.messaging'])
          creds.refresh(gtr.Request())
          H = {'Authorization': 'Bearer ' + creds.token}
          pid = sa['project_id']

          ahora = datetime.datetime.now(datetime.timezone.utc)
          hora_utc = ahora.hour
          hoy_utc = ahora.strftime('%Y-%m-%d')
          manual = os.environ.get('EVENTO') == 'workflow_dispatch'
          LEGADO = {'manana': 7, 'tarde': 15, 'noche': 21}
          VENTANA = 2   # horas de gracia: si una ejecucion se salta, la siguiente alcanza al lector

          # Leer los dispositivos registrados en Firestore
          docs, page = [], None
          base = f'https://firestore.googleapis.com/v1/projects/{pid}/databases/(default)/documents/tokens'
          while True:
              url = base + '?pageSize=300' + (('&pageToken=' + page) if page else '')
              r = requests.get(url, headers=H).json()
              for d in r.get('documents', []):
                  f = d.get('fields', {})
                  t = f.get('token', {}).get('stringValue')
                  if not t:
                      continue
                  # hora local elegida (entero) o franja antigua (texto)
                  h = f.get('hora', {})
                  if 'integerValue' in h:
                      hora_local = int(h['integerValue'])
                  elif 'stringValue' in h:
                      hora_local = LEGADO.get(h['stringValue'], 7)
                  else:
                      hora_local = 7
                  # tz: minutos de getTimezoneOffset (UTC menos local); Chile invierno = 240
                  tz = f.get('tz', {})
                  tz_min = int(tz.get('integerValue', 240)) if tz else 240
                  objetivo_utc = round((hora_local + tz_min / 60)) % 24
                  # ya recibio hoy?  (guardamos la fecha UTC del ultimo envio)
                  ult = f.get('last', {}).get('stringValue', '')
                  # delta = horas transcurridas desde su hora objetivo (con vuelta de dia)
                  delta = (hora_utc - objetivo_utc) % 24
                  toca = (0 <= delta <= VENTANA)
                  if manual or (toca and ult != hoy_utc):
                      docs.append((d['name'], t))
              page = r.get('nextPageToken')
              if not page:
                  break

          cuerpo = ('Tu lectura de hoy te espera. '
                    'Un dia mas caminando por toda la Escritura.')
          msg_url = f'https://fcm.googleapis.com/v1/projects/{pid}/messages:send'
          ok = bad = 0
          for name, t in docs:
              body = {'message': {
                  'token': t,
                  'webpush': {
                      'notification': {
                          'title': 'Ad Fontes - dia de lectura',
                          'body': cuerpo,
                          'icon': 'https://adfontesproject.github.io/Logo%20Ad%20Fontes.png'
                      },
                      'fcm_options': {'link': 'https://adfontesproject.github.io/'}
                  }}}
              resp = requests.post(msg_url, headers=H, json=body)
              if resp.status_code == 200:
                  ok += 1
                  # marcar como enviado hoy (solo en envios programados, no en pruebas manuales)
                  if not manual:
                      requests.patch(
                          'https://firestore.googleapis.com/v1/' + name + '?updateMask.fieldPaths=last',
                          headers=H, json={'fields': {'last': {'stringValue': hoy_utc}}})
              else:
                  bad += 1
                  if resp.status_code in (400, 404):
                      requests.delete('https://firestore.googleapis.com/v1/' + name, headers=H)

          print(f'Hora UTC: {hora_utc} | Enviadas: {ok} | Fallidas/limpiadas: {bad} | Dispositivos alcanzados: {len(docs)}')
          EOF
